# Reads from a .env file in this same directory (copy .env.example to .env
# first). Non-sensitive values fall back to sane defaults if unset;
# POSTGRES_PASSWORD and SECRET_KEY deliberately have NO fallback here —
# see the comments below for why.
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bookingapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your .env file}
      POSTGRES_DB: ${POSTGRES_DB:-bookings}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bookingapp} -d ${POSTGRES_DB:-bookings}"]
      interval: 5s
      timeout: 5s
      retries: 5

  bookinginsights:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bookingapp}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your .env file}@db:5432/${POSTGRES_DB:-bookings}
      LOG_DIR: /app/logs
      UPLOAD_LOG_DIR: /app/upload_logs
      SECRET_KEY: ${SECRET_KEY:-}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-booking-manifest@example.com}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SUMMARY_EMAIL_RECIPIENTS: ${SUMMARY_EMAIL_RECIPIENTS:-}
      SUMMARY_EMAIL_HOUR: ${SUMMARY_EMAIL_HOUR:-7}
      SUMMARY_EMAIL_MINUTE: ${SUMMARY_EMAIL_MINUTE:-0}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./upload_logs:/app/upload_logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    environment:

      API_BASE_URL: http://bookinginsights:8000
    depends_on:
      bookinginsights:
        condition: service_healthy


  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8025:8025"   
      - "127.0.0.1:1025:1025"   

volumes:
  pgdata:
